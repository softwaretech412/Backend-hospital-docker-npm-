services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: comet
      POSTGRES_DB: saludplus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:comet@postgres:5432/saludplus
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: saludplus
      SIMULACRO_CSV_PATH: ./data/simulation_saludplus_data.csv
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
